<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filosofi Ketupat Interaktif</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #f4f7f4; }
        .wrapper { position: relative; width: 90vw; max-width: 500px; aspect-ratio: 1/1; border: 5px solid #2e7d32; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .ketupat-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .grid-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); }
        .cell { border: 1px solid rgba(255,255,255,0.2); cursor: pointer; transition: 0.3s; }
        .cell:hover { background: rgba(255, 255, 255, 0.3); box-shadow: inset 0 0 15px rgba(255,255,255,0.5); }
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; backdrop-filter: blur(8px); }
        #modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 25px; width: 85%; max-width: 350px; text-align: center; border-bottom: 8px solid #4caf50; }
        h3 { color: #2e7d32; margin-top: 0; font-size: 1.4em; }
        p { color: #444; line-height: 1.6; font-size: 1.1em; margin-bottom: 20px; }
        button { background: #2e7d32; color: white; border: none; padding: 12px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1em; }
    </style>
</head>
<body>

<div class="wrapper">
    <img src="ketupat.jpg" class="ketupat-img" alt="Ketupat">
    <div class="grid-overlay" id="grid"></div>
</div>

<div id="modal-overlay" onclick="closeModal()">
    <div id="modal-content" onclick="event.stopPropagation()">
        <h3 id="m-title">Makna Filosofis</h3>
        <p id="m-desc"></p>
        <button onclick="closeModal()">Tutup</button>
    </div>
</div>

<script>
    const filosofi = [
        "Ngaku Lepat: Mengakui kesalahan dengan jujur.", "Laku Papat: Empat tindakan menuju fitrah.",
        "Lebaran: Pintu maaf telah terbuka lebar.", "Luberan: Melimpahnya harta untuk disedekahkan.",
        "Leburan: Melebur dosa antar sesama.", "Laburan: Menjaga diri tetap putih suci.",
        "Janur: Ja'a Nur - Telah datang cahaya hidayah.", "Kuning: Melambangkan hati yang gembira.",
        "Beras Putih: Simbol kebersihan hati setelah puasa.", "Anyaman: Simbol persaudaraan yang tak terputus.",
        "Rumit: Hidup penuh cobaan namun berpola indah.", "Kiblat Papat: Keseimbangan arah hidup.",
        "Rendah Hati: Ketupat digantung merunduk ke bawah.", "Kemenangan: Hadiah bagi yang lulus ujian Ramadhan.",
        "Harmoni: Keharmonisan hubungan manusia dan Pencipta.", "Warisan: Cara Sunan Kalijaga berdakwah dengan budaya."
    ];

    const grid = document.getElementById('grid');
    for (let i = 0; i < 16; i++) {
        let box = document.createElement('div');
        box.className = 'cell';
        box.onclick = () => {
            document.getElementById('m-desc').innerText = filosofi[i];
            document.getElementById('modal-overlay').style.display = 'block';
        };
        grid.appendChild(box);
    }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
</script>
</body>
</html>
